<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Deck Recycle - Live Preview</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background: #121212; color: white; }
        .btn { padding: 15px 30px; font-size: 18px; cursor: pointer; border: none; border-radius: 5px; margin: 10px; }
        .btn-update { background-color: #e74c3c; color: white; }
        .btn-play { background-color: #2ecc71; color: white; }
        #status { margin-top: 20px; color: #f1c40f; }
    </style>
</head>
<body>
    <h1>Deck Recycle - Artist Review Dashboard</h1>
    <p>Gunakan halaman ini untuk memperbarui game sebelum mencobanya.</p>
    
    <button class="btn btn-update" onclick="updateGame()">1. Tarik Update Terbaru (Git Pull)</button>
    <br>
    <button class="btn btn-play" onclick="window.location.href='/index.html'">2. Mainkan Game</button>

    <div id="status"></div>

    <script>
        async function updateGame() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "Sedang menarik data terbaru dari GitHub...";
            
            try {
                // Menembak endpoint API yang sudah Anda buat di server.js
                const response = await fetch('/api/update-repo', { method: 'POST' });
                const data = await response.json();
                
                if (data.success) {
                    statusDiv.innerHTML = "<span style='color: #2ecc71;'>Berhasil diupdate! Klik 'Mainkan Game'.</span>";
                } else {
                    statusDiv.innerText = "Gagal mengupdate: " + data.message;
                }
            } catch (err) {
                statusDiv.innerText = "Error menghubungkan ke server.";
            }
        }
    </script>
</body>
</html>
